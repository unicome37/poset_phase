experiment:
  n_values: [20, 30]
  families:
    - lorentzian_like_2d
    - lorentzian_like_3d
    - lorentzian_like_4d
    - KR_like
    - multi_layer_random
  gammas: [0.2, 0.8]
  beta: 1.0
  samples_per_family: 4
  sis_runs: 48
  action_modes: [A1]
  exact_threshold: 0

coarse_grain:
  keep_ratios: [0.8, 0.6]
  repeats: 2
  zeta: 1.0
  eta: 1.0
  reference_family: lorentzian_like_2d
  gc_reference_max_pairs: 32
  gc_reference_sigma_scale: 2.5

output:
  directory: outputs_cg_dimension
