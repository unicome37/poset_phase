experiment:
  n_values: [10, 12, 14, 16]
  gammas: [0.0, 0.5, 1.0, 1.5, 2.0, 3.0, 4.0, 6.0, 8.0, 10.0, 15.0, 20.0]
  beta: 1.0
  samples_per_family: 10
  sis_runs: 16
  action_modes: [A1, A2, A3]
  exact_threshold: 16

normalization:
  method: robust_zscore
  group_by: [n]

bootstrap:
  enabled: true
  n_bootstrap: 200
  seed: 12345
  value_col: score_norm
  value_std_col: score_norm_std_est

calibration:
  n_values: [8, 10, 12]
  families: [absolute_layered, KR_like, lorentzian_like_2d]
  samples_per_family: 2
  sis_runs: 16

plots:
  directory: plots

diagnostics:
  n_values: [10, 12, 14, 16]
  families: [absolute_layered, KR_like, lorentzian_like_2d, multi_layer_random]
  samples_per_family: 6

output:
  directory: outputs_frozen_exact
  raw_samples_csv: raw_samples.csv
  summary_csv: summary.csv
  bootstrap_csv: bootstrap_summary.csv
  calibration_raw_csv: calibration_raw.csv
  calibration_summary_csv: calibration_summary.csv
