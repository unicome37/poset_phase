experiment:
  n_values: [20, 30]
  beta: 1.0
  gamma: 0.8
  sis_runs: 48
  exact_threshold: 0

controlled_scan:
  reference_family: lorentzian_like_2d
  families:
    - lorentzian_like_2d
    - lorentzian_like_3d
    - lorentzian_like_4d
  reference_pool_size: 120
  quantile_low: 0.10
  quantile_high: 0.90
  accepted_target: 6
  max_attempts: 800
  regimes:
    comp_only: [comp]
    comp_height: [comp, height_ratio]
    comp_height_width: [comp, height_ratio, width_ratio]

output:
  directory: outputs_controlled_dimension
