experiment_id: falsify_c2_background_response_flrw_metricfaithful_phaseB
output_dir: d:/Kiro/理论体系/poset_phase/outputs_carlip
output_basename: falsify_c2_background_response_flrw_metricfaithful_phaseB
seed_base: 42
reps: 12
n_grid: [1024, 1536, 2048]
include_families: [flrw]

# 文档字段（runner会忽略）：用于与 lowN/highN 历史结果做跨尺度拼接
flrw_model: metric_faithful_current

windows:
  de_sitter_h: [0.1, 0.3]
  flrw_kappa: [0.3, 1.0]
  schwarz_phi0: [0.01, 0.05]

hard_fail:
  min_fail_ratio: 0.5
  top_k_required: 2
  seed_runs: 10

strong_regime:
  de_sitter_h: [0.5, 1.0]
  flrw_kappa: [3.0]
  schwarz_phi0: [0.1]

checkpoint_every_seed: true
resume_from_partial: true

# 监控模式：无进展时打开细粒度日志，便于确认卡点位置
verbose_progress: true
progress_reps: false
