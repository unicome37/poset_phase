experiment:
  n_values: [16]
  families:
    - KR_like
    - lorentzian_like_2d
    - lorentzian_like_3d
    - transitive_percolation
    - multi_layer_random
  gammas: [0.2, 0.8]
  beta: 1.0
  samples_per_family: 3
  sis_runs: 32
  action_modes: [A2]
  exact_threshold: 16

coarse_grain:
  keep_ratios: [0.8, 0.6]
  repeats: 2
  zeta: 1.0
  eta: 1.0
  reference_family: lorentzian_like_2d
  gc_reference_max_pairs: 32
  gc_reference_sigma_scale: 2.5

output:
  directory: outputs_frozen_cg
