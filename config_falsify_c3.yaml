experiment_id: falsify_c2_background_response
output_dir: outputs_carlip
seed_base: 42
reps: 20
n_grid: [256, 512, 768, 1024, 1536, 2048]

# 弱/中曲率窗口（预注册）
windows:
  de_sitter_h: [0.1, 0.3]
  flrw_kappa: [0.3, 1.0]
  schwarz_phi0: [0.01, 0.05]

# C2 Hard Fail: 在弱/中曲率窗口内，>=50% N 档位跌出 top-2
hard_fail:
  min_fail_ratio: 0.5
  top_k_required: 2
  seed_runs: 10

# 扩展点（可选）
strong_regime:
  de_sitter_h: [0.5, 1.0]
  flrw_kappa: [3.0]
  schwarz_phi0: [0.1]
