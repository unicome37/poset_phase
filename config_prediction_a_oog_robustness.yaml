# Prediction A out-of-grid robustness test
# New N points (not in original grid) + new gamma points + new seed offsets
experiment:
  n_values: [22, 26, 30, 38, 42]
  families:
    - lorentzian_like_2d
    - lorentzian_like_3d
    - lorentzian_like_4d
    - KR_like
  gammas: [0.1, 0.3, 0.5, 0.7, 0.9, 1.1, 1.5, 1.9]
  variants:
    - A2_full
    - A2_replace_dim_with_consistency
    - A2_replace_dim_with_multi_consistency
  beta: 1.0
  samples_per_family: 4
  sis_runs: 2048
  exact_threshold: 32
  family_exact_thresholds:
    lorentzian_like_2d: 60
    lorentzian_like_3d: 32
    lorentzian_like_4d: 32
    KR_like: 32
  consistency_weight: 0.682882
  multi_consistency_weight: 0.682882
  seed_offset: 100000

normalization:
  method: robust_zscore
  group_by: [n]

bootstrap:
  enabled: true
  n_bootstrap: 200
  seed: 12345
  value_col: score_norm
  value_std_col: score_norm_std_est

output:
  directory: outputs_exploratory/prediction_a_oog_robustness
  raw_samples_csv: raw_samples.csv
  summary_csv: summary.csv
  bootstrap_csv: bootstrap_summary.csv
