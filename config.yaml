experiment:
  n_values: [20, 40, 60, 80]
  gammas: [0.0, 0.1, 0.2, 0.4, 0.8]
  beta: 1.0
  samples_per_family: 16
  sis_runs: 64
  action_modes: [A1, A2, A3]

normalization:
  method: robust_zscore
  group_by: [n]

bootstrap:
  enabled: true
  n_bootstrap: 500
  seed: 12345
  value_col: score_norm
  value_std_col: score_norm_std_est

calibration:
  n_values: [8, 10, 12]
  families: [absolute_layered, KR_like, lorentzian_like_2d, transitive_percolation]
  samples_per_family: 4
  sis_runs: 64

plots:
  directory: plots

output:
  directory: outputs
  raw_samples_csv: raw_samples.csv
  summary_csv: summary.csv
  bootstrap_csv: bootstrap_summary.csv
  calibration_raw_csv: calibration_raw.csv
  calibration_summary_csv: calibration_summary.csv
