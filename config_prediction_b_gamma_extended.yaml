experiment:
  n_values: [20, 28, 36, 44]
  families:
    - KR_like
    - lorentzian_like_2d
  gammas: [0.0, 0.2, 0.4, 0.8, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]
  beta: 1.0
  samples_per_family: 4
  sis_runs: 32
  action_modes: [A2]
  exact_threshold: 44

normalization:
  method: robust_zscore
  group_by: [n]

bootstrap:
  enabled: false
  n_bootstrap: 200
  seed: 12345
  value_col: score_norm
  value_std_col: score_norm_std_est

output:
  directory: outputs_exploratory/prediction_b_gamma_extended
  raw_samples_csv: raw_samples.csv
  summary_csv: summary.csv
  bootstrap_csv: bootstrap_summary.csv
